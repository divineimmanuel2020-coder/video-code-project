<!DOCTYPE html>
<html>
<head>
  <title>My Video Animation</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      color: white;
      font-size: 50px;
      animation: fadeIn 3s ease-in-out infinite;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }
  </style>
</head>

<body>
  <h1>Hello, My First Code Video</h1>
</body>
</html>
